services:
  bot-opus:
    build: .
    image: rps-bot:latest
    environment:
      - TOKEN=${TOKEN_OPUS}
      - AI=opus
      - DEBUG=false
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped

  bot-codex:
    image: rps-bot:latest
    pull_policy: never
    environment:
      - TOKEN=${TOKEN_CODEX}
      - AI=codex
      - DEBUG=false
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped

  bot-random:
    image: rps-bot:latest
    pull_policy: never
    environment:
      - TOKEN=${TOKEN_RANDOM}
      - AI=random
      - DEBUG=false
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped

  bot-swe15:
    image: rps-bot:latest
    pull_policy: never
    environment:
      - TOKEN=${TOKEN_SWE15}
      - AI=swe15
      - DEBUG=false
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped

  bot-gpt:
    image: rps-bot:latest
    pull_policy: never
    environment:
      - TOKEN=${TOKEN_GPT}
      - AI=gpt
      - DEBUG=false
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
